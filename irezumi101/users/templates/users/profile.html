{% extends 'irezumi/base.html' %}
{% block content %}
    <h1>Профиль: {{ user.username }}</h1>
    <div class="content-text">
        {% if user.photo %}
            <p><img src="{{ user.photo.url }}" width="150" style="border-radius: 50%;"></p>
        {% endif %}
        
        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            <div class="form-error">{{ form.non_field_errors }}</div>
            {% for f in form %}
                <p><label class="form-label" for="{{ f.id_for_label }}">{{ f.label }}:</label>{{ f }}</p>
                <div class="form-error">{{ f.errors }}</div>
            {% endfor %}
            <p><button type="submit" class="button form-button">Сохранить профиль</button></p>
        </form>
        <hr>
        <p><a href="{% url 'users:password_change' %}">Сменить пароль</a></p>
    </div>
{% endblock %}
